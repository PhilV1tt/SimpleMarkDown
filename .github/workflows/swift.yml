name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build
        run: |
          xcodebuild \
            -project SimpleMarkDown.xcodeproj \
            -scheme SimpleMarkDown \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
